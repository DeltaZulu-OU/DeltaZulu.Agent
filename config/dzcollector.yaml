# DeltaZulu daemon collector configuration for local RELP validation.
id: local-collector-daemon
profilesPath: profiles

pipeline:
  input:
    mode: relp
  filter:
    mode: passthrough
  output:
    mode: console
    encoding: ndjson
    transport: console
    prettyPrint: true

relpInput:
  address: 127.0.0.1
  port: 2514
  useTls: false

diagnostics:
  intervalSeconds: null
