id: local-relp-forwarder
buffer:
  path: ./buffer/forwarder
  maxChunkRecords: 100
  maxChunkAgeSeconds: 1
relp:
  useTls: false
  tls:
    # systemTrust uses the platform trust store when useTls is true.
    # thumbprint requires allowedServerCertificateThumbprints.
    # disabled is for isolated lab validation only.
    certificateValidation: SystemTrust
    allowedServerCertificateThumbprints: []
    certificateExpiryWarningDays: 30
    # Disable during development to keep configured cert paths without presenting mTLS client identity.
    clientCertificateEnabled: true
    # clientCertificatePath: /path/to/client.pfx
    # clientCertificatePassword: changeit
  endpoints:
    - host: 127.0.0.1
      port: 6514
