# DeltaZulu Agent daemon sample configuration.
#
# The daemon gets its runnable pipeline from resource profiles. Point
# profilesPath at the profile directory delivered by policy; each enabled
# profile's resource block selects the input resource and its filter block
# supplies the KQL filter/projection.
id: local-agent-daemon
profilesPath: profiles

pipeline:
  input:
    mode: profiles
  filter:
    mode: profiles
  output:
    # Forwarding encodes DeliveryBatch payloads with MessagePack and sends them
    # over RELP. Use console or file for local profile/output validation.
    mode: forward
    encoding: messagepack
    transport: relp
    # file: ./collector.ndjson

buffer:
  # Durable local queue used when the RELP endpoint is unavailable.
  path: ./buffer/agentd
  maxChunkRecords: 100
  maxChunkAgeSeconds: 1

# Optional stunnel-style TCP tunnel. When enabled, the pipeline sends plain
# RELP to this local listener; DeltaZulu.Pipeline.Tunnel forwards bytes to
# relp.endpoints using the relp.useTls and relp.tls settings managed here.
tunnel:
  enabled: false
  listen:
    host: 127.0.0.1
    port: 2514

relp:
  useTls: false
  tls:
    # Use SystemTrust for production TLS validation. Lab-only alternatives are
    # controlled by ForwarderTlsConfiguration and should not be used in prod.
    certificateValidation: SystemTrust
    allowedServerCertificateThumbprints: []
    certificateExpiryWarningDays: 30
    # Disable during development to keep configured cert paths without presenting mTLS client identity.
    clientCertificateEnabled: true
  endpoints:
    # Local demo collector default. Replace with your production collector host.
    - host: 127.0.0.1
      port: 2514

# Optional Windows-only resource quotas for low-resource environments.
# Uncomment cpuPercent to hard-cap the daemon process CPU usage with a
# Windows Job Object. Valid range: 1-100. Non-Windows builds log a warning
# and ignore this setting.
# resourceQuotas:
#   cpuPercent: 20

diagnostics:
  # Emit daemon/buffer health observations every N seconds. Set to null or remove
  # this value to disable periodic diagnostics.
  intervalSeconds: 60
