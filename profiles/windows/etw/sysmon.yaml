schemaVersion: 1
id: windows.etw.sysmon
name: Microsoft Sysmon ETW resource filter
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Sysmon
  provider: Microsoft-Windows-Sysmon
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
   Etw
    | where ProviderName =~ "Microsoft-Windows-Sysmon"
    // Keep core Sysmon detection classes; omit broad file, registry, pipe, and image-load variants unless the Sysmon config is separately tuned.
    | where EventId in (1, 3, 7, 11, 19, 20, 21, 22)
