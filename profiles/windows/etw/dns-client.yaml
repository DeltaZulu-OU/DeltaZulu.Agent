version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-DNS-Client
  provider: Microsoft-Windows-DNS-Client
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-DNS-Client"
    // Keep DNS timeout/name-error/malformed-query task families; omit successful-query churn from browsers, update agents, and cloud services.
    | where EventId in (1013, 1015, 1016, 1024, 1025, 1026)
