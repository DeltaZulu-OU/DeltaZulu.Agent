schemaVersion: 1
id: windows.etw.dns-client
name: Microsoft DNS Client ETW resolver events
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-DNS-Client
  provider: Microsoft-Windows-DNS-Client
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-DNS-Client"
    // 3008: DNS Client Query Completed; suppress local machine, empty-result, and local suffix resolution noise.
    | where EventId == 3008
    | where QueryOptions != "140737488355328"
    | where QueryResults != ""
    | where not(DnsName endswith ".local" or DnsName endswith ".localdomain" or DnsName endswith ".lan" or QueryName endswith ".local" or QueryName endswith ".localdomain" or QueryName endswith ".lan")
    | project TimeCreated, ProviderName, EventId, EventName, ProcessId, DnsName, QueryName, QueryType, QueryOptions, QueryResults, ResponseCode, Status, Image, CommandLine, _metadata
