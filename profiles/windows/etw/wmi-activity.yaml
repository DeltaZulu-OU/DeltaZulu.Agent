schemaVersion: 1
id: windows.etw.wmi-activity
name: Microsoft WMI Activity ETW operations
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-WMI-Activity
  provider: Microsoft-Windows-WMI-Activity
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-WMI-Activity"
    // Keep WMI provider/activity/subscription events including 5861 persistence evidence; suppress benign 5858 patterns downstream by tool/namespace rather than dropping the ID.
    | where EventId in (5857, 5858, 5859, 5860, 5861)
