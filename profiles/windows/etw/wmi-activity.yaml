id: windows.etw.wmi-activity
name: Microsoft WMI Activity ETW operations
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-WMI-Activity
  provider: Microsoft-Windows-WMI-Activity
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-WMI-Activity"
    // Keep provider/activity/subscription events; reduce routine root\cimv2 service noise while retaining non-service use.
    | where EventId in (5857, 5858, 5859, 5860, 5861)
    | where Namespace !startswith @"root\cimv2" or not(User in~ ("SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE"))
