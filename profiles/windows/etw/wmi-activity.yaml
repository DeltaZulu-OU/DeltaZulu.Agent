schemaVersion: 1
id: windows.etw.wmi-activity
name: Microsoft WMI Activity ETW operations
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-WMI-Activity
  provider: Microsoft-Windows-WMI-Activity
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-WMI-Activity"
    // Keep provider/activity/subscription events; reduce routine root\cimv2 service noise while retaining non-service use.
    | where EventId in (5857, 5858, 5859, 5860, 5861)
    | where Namespace !startswith "root\cimv2" or not(User in~ ("SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE"))
    | project TimeCreated, ProviderName, EventId, EventName, ProcessId, User, Namespace, Query, Operation, ClientProcessId, Image, CommandLine, _metadata
