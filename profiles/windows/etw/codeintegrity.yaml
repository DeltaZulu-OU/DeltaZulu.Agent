id: windows.etw.codeintegrity
name: Microsoft Code Integrity ETW policy events
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-CodeIntegrity
  provider: Microsoft-Windows-CodeIntegrity
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-CodeIntegrity"
    // Keep WDAC/App Control block and audit-block evidence; omit Managed Installer/ISG diagnostics that can be numerous outside troubleshooting.
    | where EventId in (3033, 3034, 3076, 3077, 3089, 3099)
