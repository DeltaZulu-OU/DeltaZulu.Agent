schemaVersion: 1
id: windows.etw.applocker
name: Microsoft AppLocker ETW policy events
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-AppLocker
  provider: Microsoft-Windows-AppLocker
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-AppLocker"
    | where EventId in (8003, 8004, 8006, 8007, 8021, 8022, 8024, 8025)
