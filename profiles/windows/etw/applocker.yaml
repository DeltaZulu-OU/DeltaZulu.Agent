id: windows.etw.applocker
name: Microsoft AppLocker ETW policy events
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-AppLocker
  provider: Microsoft-Windows-AppLocker
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-AppLocker"
    // Keep block/deny outcomes for baseline collection; audit-only allow/would-block events are left for short baselining runs to avoid noisy allow telemetry.
    | where EventId in (8004, 8007, 8022, 8025, 8027)
