schemaVersion: 1
id: windows.etw.security-auditing
name: Microsoft Security Auditing ETW events
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Security-Auditing
  provider: Microsoft-Windows-Security-Auditing
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Security-Auditing"
    // Keep a curated Security audit baseline; omit object-access and firewall allow events such as 4662/5156 unless scoped to high-value roles.
    | where EventId in (1102, 4624, 4625, 4672, 4688, 4697, 4698, 4702, 4719, 4720, 4722, 4723, 4724, 4725, 4726, 4728, 4729, 4732, 4768, 4769, 4771, 4776)
