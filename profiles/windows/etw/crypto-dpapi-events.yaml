id: windows.etw.crypto-dpapi-events
name: Microsoft Crypto DPAPI ETW protection events
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Crypto-DPAPI-Events
  provider: Microsoft-Windows-Crypto-DPAPI-Events
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Crypto-DPAPI-Events"
    // Keep backup-key and DPAPI error events; omit routine informational master-key/data-protection operations that add little baseline signal.
    | where EventId in (4097, 4098, 8193, 8194, 8195, 8196)
