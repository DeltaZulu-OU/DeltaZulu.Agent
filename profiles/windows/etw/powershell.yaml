schemaVersion: 1
id: windows.etw.powershell
name: Microsoft PowerShell ETW script activity
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-PowerShell
  provider: Microsoft-Windows-PowerShell
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-PowerShell"
    // Keep module and script-block logging for detection; omit verbose lifecycle/progress events that are less useful for baseline collection.
    | where EventId in (4103, 4104)
