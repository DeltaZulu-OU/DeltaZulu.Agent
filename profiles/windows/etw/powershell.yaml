schemaVersion: 1
id: windows.etw.powershell
name: Microsoft PowerShell ETW script and module logging
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-PowerShell
  provider: Microsoft-Windows-PowerShell
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-PowerShell"
    | where EventId in (4103, 4104, 4105, 4106)
