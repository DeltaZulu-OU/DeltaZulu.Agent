id: windows.etw.kernel-network
name: Microsoft Kernel Network ETW connections
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Kernel-Network
  provider: Microsoft-Windows-Kernel-Network
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Kernel-Network"
    // Keep connection-oriented network telemetry and drop loopback chatter.
    | where EventId in (10, 11, 12)
    | where not(RemoteIp startswith "127." or RemoteIp == "::1" or RemoteAddress startswith "127." or RemoteAddress == "::1")
