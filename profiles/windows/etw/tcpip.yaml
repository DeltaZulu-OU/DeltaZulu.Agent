schemaVersion: 1
id: windows.etw.tcpip
name: Microsoft TCPIP ETW network telemetry
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-TCPIP
  provider: Microsoft-Windows-TCPIP
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-TCPIP"
    | where EventId in (1300, 1341, 1364, 1365) or EventName has_any ("Connect", "Endpoint", "Summary", "Rundown")
