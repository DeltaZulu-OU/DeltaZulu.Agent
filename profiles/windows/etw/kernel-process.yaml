schemaVersion: 1
id: windows.etw.kernel-process
name: Windows Kernel Process ETW resource filter
version: 1.0.0
enabled: true
resource:
  platform: windows
  family: etw
  provider: Microsoft-Windows-Kernel-Process
input:
  table: Source
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Source
    | where ProviderName == "Microsoft-Windows-Kernel-Process"
    | project Timestamp, ProviderName, EventId, EventName, Opcode, Task, Keywords, ActivityId, Payload, RawEvent, _metadata
