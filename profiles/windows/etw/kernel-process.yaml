version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Kernel-Process
  provider: Microsoft-Windows-Kernel-Process
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Kernel-Process"
    // Keep process and image lifecycle events; omit thread and priority-change families unless running a focused troubleshooting trace.
    | where EventName in~ ("ProcessStart", "ProcessStop", "ImageLoad", "ImageUnload") or EventId in (1, 2, 5, 6)
