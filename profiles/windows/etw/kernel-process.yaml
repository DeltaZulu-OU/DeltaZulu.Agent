id: windows.etw.kernel-process
name: Microsoft Kernel Process ETW activity
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Kernel-Process
  provider: Microsoft-Windows-Kernel-Process
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Kernel-Process"
    // Keep process creation/termination plus image load/unload for execution lineage; omit thread/priority noise.
    | where EventName in~ ("ProcessStart", "ProcessStop", "ImageLoad", "ImageUnload") or EventId in (1, 2, 5, 6)
