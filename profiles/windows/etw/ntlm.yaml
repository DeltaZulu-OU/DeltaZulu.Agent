id: windows.etw.ntlm
name: Microsoft NTLM ETW authentication auditing
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-NTLM
  provider: Microsoft-Windows-NTLM
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-NTLM"
    | where EventId in (8001)
