schemaVersion: 1
id: windows.etw.kernel-file
name: Microsoft Kernel File ETW activity
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-Kernel-File
  provider: Microsoft-Windows-Kernel-File
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-Kernel-File"
    // Keep create/write/rename/delete-style file semantics; omit blanket read/open/close noise that dominates baseline file telemetry.
    | where EventId in (12, 14, 17, 23, 26, 27, 30, 31, 32, 33, 34)
