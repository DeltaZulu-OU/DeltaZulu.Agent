schemaVersion: 1
id: windows.etw.dotnet-runtime
name: Microsoft .NET Runtime ETW execution events
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-DotNETRuntime
  provider: Microsoft-Windows-DotNETRuntime
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-DotNETRuntime"
    // Keep loader/JIT/exception-oriented CLR events; omit GC, heap, allocation, and rundown telemetry that is too costly for routine detection.
    | where EventId in (80, 141, 151, 154, 155, 156, 157, 158)
