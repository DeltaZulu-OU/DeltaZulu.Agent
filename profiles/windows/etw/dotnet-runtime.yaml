id: windows.etw.dotnet-runtime
name: Microsoft .NET Runtime ETW execution events
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-DotNETRuntime
  provider: Microsoft-Windows-DotNETRuntime
filter:
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-DotNETRuntime"
    // Keep loader/JIT/exception-oriented CLR events; suppress framework bootstrap assemblies and high-volume runtime maintenance telemetry.
    | where EventId in (80, 141, 151, 154, 155, 156, 157, 158)
    | where not(AssemblyName startswith "System." or AssemblyName startswith "Microsoft." or ModuleName startswith "System." or ModuleName startswith "Microsoft.")
