schemaVersion: 1
id: windows.etw.smbclient
name: Microsoft SMB Client ETW remote access
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: etw
  mode: managed
  session: DeltaZulu-SMBClient
  provider: Microsoft-Windows-SMBClient
input:
  table: Etw
  schema: WindowsEtw.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    Etw
    | where ProviderName =~ "Microsoft-Windows-SMBClient"
    // Keep share/connect-style events and suppress approved backup/sync shares.
    | where EventId in (1001, 1002, 1003)
    | where not(ShareName in~ (@"\\fileserver\backup", @"\\fileserver\sync"))
