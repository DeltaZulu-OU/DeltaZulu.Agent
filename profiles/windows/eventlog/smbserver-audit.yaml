schemaVersion: 1
id: windows.eventlog.smbserver-audit
name: SMB Server Audit Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-SMBServer/Audit
  provider: Microsoft-Windows-SMBServer
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-SMBServer/Audit"
    | where EventId in (3000)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
