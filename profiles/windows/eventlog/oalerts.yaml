schemaVersion: 1
id: windows.eventlog.oalerts
name: Microsoft Office Alerts Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: OAlerts
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "OAlerts"
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
