id: windows.eventlog.security-mitigations-kernelmode
name: Security Mitigations KernelMode Event Log
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Security-Mitigations/KernelMode
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Security-Mitigations/KernelMode"
