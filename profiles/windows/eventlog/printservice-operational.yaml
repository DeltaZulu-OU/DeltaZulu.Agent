id: windows.eventlog.printservice-operational
name: PrintService Operational print job events
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-PrintService/Operational
  provider: Microsoft-Windows-PrintService
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-PrintService/Operational"
    | where EventId in (307)
