schemaVersion: 1
id: windows.eventlog.printservice-operational
name: PrintService Operational print job events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-PrintService/Operational
  provider: Microsoft-Windows-PrintService
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-PrintService/Operational"
    | where EventId in (307)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
