schemaVersion: 1
id: windows.eventlog.applocker-packaged-app-execution
name: AppLocker Packaged app Execution Event Log
version: 1.0.0
enabled: true
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-AppLocker/Packaged app-Execution
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where EventId in (8021, 8022)
