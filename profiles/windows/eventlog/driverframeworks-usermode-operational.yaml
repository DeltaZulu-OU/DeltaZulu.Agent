schemaVersion: 1
id: windows.eventlog.driverframeworks-usermode-operational
name: Driver Frameworks User Mode Operational Event Log
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-DriverFrameworks-UserMode/Operational
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-DriverFrameworks-UserMode/Operational"
