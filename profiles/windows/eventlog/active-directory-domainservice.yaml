id: windows.eventlog.active-directory-domainservice
name: Active Directory Domain Service Event Log
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-ActiveDirectory_DomainService
condition:
  type: wmi
  query: select * from Win32_OperatingSystem where ProductType=2
  mandatory: false
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-ActiveDirectory_DomainService"
