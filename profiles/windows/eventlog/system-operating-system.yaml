id: windows.eventlog.system-operating-system
name: System operating system lifecycle events
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: System
filter:
  query: |
    EventLog
    | where source =~ "System"
    | where (ProviderName =~ "Microsoft-Windows-Kernel-General" and EventId in (12, 13))
        or (ProviderName =~ "USER32" and EventId == 1074)
        or EventId in (41, 1001, 6008, 4621, 16962, 16965, 16968, 16969)
