schemaVersion: 1
id: windows.eventlog.system-operating-system
name: System operating system lifecycle events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: System
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "System"
    | where (ProviderName =~ "Microsoft-Windows-Kernel-General" and EventId in (12, 13))
        or (ProviderName =~ "USER32" and EventId == 1074)
        or EventId in (41, 1001, 6008, 4621, 16962, 16965, 16968, 16969)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
