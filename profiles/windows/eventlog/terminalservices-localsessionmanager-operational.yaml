id: windows.eventlog.terminalservices-localsessionmanager-operational
name: Terminal Services Local Session Manager Operational Event Log
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-TerminalServices-LocalSessionManager/Operational
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-TerminalServices-LocalSessionManager/Operational"
