schemaVersion: 1
id: windows.eventlog.applocker-exe-and-dll
name: AppLocker EXE and DLL Event Log
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-AppLocker/EXE and DLL
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-AppLocker/EXE and DLL"
    | where EventId in (8003, 8004)
