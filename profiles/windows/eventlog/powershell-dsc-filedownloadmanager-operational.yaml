id: windows.eventlog.powershell-dsc-filedownloadmanager-operational
name: PowerShell DSC FileDownloadManager Operational Event Log
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-PowerShell-DesiredStateConfiguration-FileDownloadManager/Operational
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-PowerShell-DesiredStateConfiguration-FileDownloadManager/Operational"
