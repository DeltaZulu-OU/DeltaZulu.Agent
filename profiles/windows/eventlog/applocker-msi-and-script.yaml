id: windows.eventlog.applocker-msi-and-script
name: AppLocker MSI and Script Event Log
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-AppLocker/MSI and Script
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-AppLocker/MSI and Script"
    | where EventId in (8006, 8007)
