schemaVersion: 1
id: windows.eventlog.windows-defender-whc
name: Windows Defender WHC exploit protection events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Windows Defender/WHC
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Windows Defender/WHC"
    | where EventId in (1121, 1122, 1123, 1124, 1125, 1126, 5007)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
