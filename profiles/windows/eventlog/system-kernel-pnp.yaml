schemaVersion: 1
id: windows.eventlog.system-kernel-pnp
name: System Kernel-PnP driver warning events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: System
  provider: Microsoft-Windows-Kernel-PnP
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "System"
    | where EventId in (219)
