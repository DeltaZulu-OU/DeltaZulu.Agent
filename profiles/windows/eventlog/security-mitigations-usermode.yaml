schemaVersion: 1
id: windows.eventlog.security-mitigations-usermode
name: Security Mitigations UserMode Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Security-Mitigations/UserMode
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Security-Mitigations/UserMode"
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
