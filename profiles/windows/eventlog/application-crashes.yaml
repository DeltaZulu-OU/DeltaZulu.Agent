schemaVersion: 1
id: windows.eventlog.application-crashes
name: Application crash and WER security-relevant events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Application
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Application"
    | where EventId in (1000, 1001, 1002)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
