schemaVersion: 1
id: windows.eventlog.terminalservices-printers-operational
name: Microsoft-Windows-TerminalServices-Printers/Operational Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-TerminalServices-Printers/Operational
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-TerminalServices-Printers/Operational"
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
