schemaVersion: 1
id: windows.eventlog.setup-servicing
name: Windows Servicing Setup package events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Setup
  provider: Microsoft-Windows-Servicing
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Setup"
    | where EventId in (0, 2, 1009)
