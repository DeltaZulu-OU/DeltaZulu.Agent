schemaVersion: 1
id: windows.eventlog.windows-powershell
name: Windows PowerShell classic Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Windows PowerShell
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Windows PowerShell"
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
