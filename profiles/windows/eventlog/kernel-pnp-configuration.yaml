schemaVersion: 1
id: windows.eventlog.kernel-pnp-configuration
name: Kernel-PnP Configuration external device events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Kernel-PnP/Configuration
  provider: Microsoft-Windows-Kernel-PnP
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Kernel-PnP/Configuration"
    | where EventId in (400, 410)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
