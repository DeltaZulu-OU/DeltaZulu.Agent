id: windows.eventlog.dns-client-operational
name: DNS Client Operational Event Log
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-DNS-Client/Operational
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-DNS-Client/Operational"
    // 3008: DNS Client Query Completed; suppress local machine and empty-result resolution noise from the WEC baseline.
    | where EventId == 3008
    | where QueryOptions != "140737488355328"
    | where QueryResults != ""
