schemaVersion: 1
id: windows.eventlog.dns-client-operational
name: DNS Client Operational Event Log
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-DNS-Client/Operational
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-DNS-Client/Operational"
    // 3008: DNS Client Query Completed; suppress local machine and empty-result resolution noise from the WEC baseline.
    | where EventId == 3008
    | where QueryOptions != "140737488355328"
    | where QueryResults != ""
    | project TimeCreated, ProviderName, EventId, EventName, QueryName, QueryType, QueryOptions, QueryResults, ResponseCode, Status, ProcessId, Image, CommandLine, _metadata
