id: windows.eventlog.protecteduserfailures-domaincontroller
name: Protected Users failures Domain Controller Event Log
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Authentication/ProtectedUserFailures-DomainController
  provider: Microsoft-Windows-NTLM
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Authentication/ProtectedUserFailures-DomainController"
