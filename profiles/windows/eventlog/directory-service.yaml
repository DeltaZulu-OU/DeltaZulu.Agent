schemaVersion: 1
id: windows.eventlog.directory-service
name: Active Directory Directory Service Event Log
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Directory Service
condition:
  type: wmi
  query: select * from Win32_OperatingSystem where ProductType=2
  mandatory: false
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Directory Service"
    | project TimeCreated, ProviderName, EventId, EventName, Level, Task, Opcode, Keywords, EventData, Message, MachineName, _metadata
