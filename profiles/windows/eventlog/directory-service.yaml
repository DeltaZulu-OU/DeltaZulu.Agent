id: windows.eventlog.directory-service
name: Active Directory Directory Service Event Log
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Directory Service
condition:
  type: wmi
  query: select * from Win32_OperatingSystem where ProductType=2
  mandatory: false
filter:
  query: |
    EventLog
    | where source =~ "Directory Service"
