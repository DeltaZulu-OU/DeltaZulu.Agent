id: windows.eventlog.system-service-control-manager
name: System Service Control Manager security-relevant service events
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: System
  provider: Service Control Manager
filter:
  query: |
    EventLog
    | where source =~ "System"
    | where EventId in (7022, 7023, 7024, 7026, 7031, 7032, 7034, 7040, 7045)
