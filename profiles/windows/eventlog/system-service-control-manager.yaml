schemaVersion: 1
id: windows.eventlog.system-service-control-manager
name: System Service Control Manager security-relevant service events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: System
  provider: Service Control Manager
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "System"
    | where EventId in (7022, 7023, 7024, 7026, 7031, 7032, 7034, 7040, 7045)
