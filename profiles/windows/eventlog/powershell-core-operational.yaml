id: windows.eventlog.powershell-core-operational
name: PowerShell Core Operational Event Log
resource:
  platform: windows
  family: eventlog
  channel: PowerShellCore/Operational
filter:
  query: |
    EventLog
    | where source =~ "PowerShellCore/Operational"
    | where EventID == 4104 // 1. Only ScriptBlock logging included
    // 2. Filter out Local System (S-1-5-18) and Local Service (S-1-5-19) accounts
    | where UserName !in ('S-1-5-18', 'S-1-5-19') and TargetLogonId !in ('S-1-5-18', 'S-1-5-19')
    // 3. The Windows input exposes named EventData elements as source-native fields.
    // 4. Apply the DCR's noise-reduction filters without re-parsing raw XML.
    | where ScriptBlockText != 'prompt'
    | where Path !has @".vscode\extensions\"
        and not(Path matches regex @'(?i)C:\\Windows\\TEMP\\SDIAG_([A-Za-z0-9]+(-[A-Za-z0-9]+)+)\\CL_Utility.ps1')
        and Path !has @"C:\ProgramData\Microsoft\Windows Defender Advanced Threat Protection\DataCollection\"
