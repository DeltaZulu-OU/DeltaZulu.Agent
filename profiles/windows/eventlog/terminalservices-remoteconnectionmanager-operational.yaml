id: windows.eventlog.terminalservices-remoteconnectionmanager-operational
name: Terminal Services Remote Connection Manager Operational Event Log
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational"
