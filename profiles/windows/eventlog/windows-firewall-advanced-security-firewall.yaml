schemaVersion: 1
id: windows.eventlog.windows-firewall-advanced-security-firewall
name: Windows Firewall Advanced Security Firewall Event Log
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Windows Firewall With Advanced Security/Firewall
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Windows Firewall With Advanced Security/Firewall"
