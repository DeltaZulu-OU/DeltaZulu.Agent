id: windows.eventlog.dns-server
name: DNS Server Event Log plugin events
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: DNS Server
condition:
  type: wmi
  query: select * from Win32_ServerFeature where ID=13
  mandatory: false
filter:
  query: |
    EventLog
    | where source =~ "DNS Server"
    // WEC DNS baseline: 150 failed plugin DLL load/initialization and 770 plugin DLL loaded.
    | where EventId in (150, 770)
