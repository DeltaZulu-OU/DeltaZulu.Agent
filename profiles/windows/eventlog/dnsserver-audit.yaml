id: windows.eventlog.dnsserver-audit
name: DNS Server Audit Event Log plugin configuration
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-DNSServer/Audit
condition:
  type: wmi
  query: select * from Win32_ServerFeature where ID=13
  mandatory: false
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-DNSServer/Audit"
    // WEC DNS baseline: 541 records serverlevelplugindll changes on scope .; channel ACL may need Event Log Readers access.
    | where EventId == 541
