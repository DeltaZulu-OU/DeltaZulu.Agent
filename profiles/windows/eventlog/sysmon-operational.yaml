id: windows.eventlog.sysmon-operational
name: Sysmon Operational Event Log resource filter
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Sysmon/Operational
  provider: Microsoft-Windows-Sysmon
filter:
  query: |
    EventLog
    | where source =~ "Microsoft-Windows-Sysmon/Operational"
