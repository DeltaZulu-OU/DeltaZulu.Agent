schemaVersion: 1
id: windows.eventlog.sysmon-operational
name: Sysmon Operational Event Log resource filter
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Microsoft-Windows-Sysmon/Operational
  provider: Microsoft-Windows-Sysmon
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
