schemaVersion: 1
id: windows.eventlog.application-emet
name: EMET Application mitigation events
version: 1.0.0
enabled: true
mandatory: false
resource:
  platform: windows
  family: eventlog
  channel: Application
  provider: EMET
input:
  table: EventLog
  schema: WindowsEventLog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where source =~ "Application"
    | where EventId in (1, 2)
    | project TimeCreated, ProviderName, EventId, EventName, EventData, Message, _metadata
