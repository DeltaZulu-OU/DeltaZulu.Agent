schemaVersion: 1
id: linux.syslog.pam
name: PAM syslog resource filter
version: 1.0.0
enabled: true
mandatory: true
resource:
  platform: linux
  family: syslog
  service: pam
input:
  table: EventLog
  schema: LinuxSyslog.Native
output:
  mode: FilterAndSelect
  format: ndjson
  preserveOriginalFieldNames: true
  preserveRawEvent: true
  metadataEnvelope: true
  eventEnvelope: true
  onNoMatch: drop
filter:
  language: kql
  query: |
    EventLog
    | where Message has "pam_" or Message has_any ("authentication failure", "session opened", "session closed")
