id: linux.syslog.sshd
name: OpenSSH daemon syslog resource filter
resource:
  platform: linux
  family: syslog
  service: sshd
filter:
  query: |
    EventLog
    | where ProcessName == "sshd" or AppName == "sshd"
    | where Message has_any ("Failed password", "Accepted password", "Accepted publickey", "Invalid user", "Disconnected from", "Connection closed by")
